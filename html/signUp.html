<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup Form</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome for icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="signup-card col-md-6">
      <h2 class="text-center mb-4 text-primary">Create Your Account</h2>
      <form id="signupForm">
        <div class="row mb-3">
          <div class="col form-floating">
            <input type="text" class="form-control" id="firstName" placeholder=" " required>
            <label for="firstName"><i class="fa fa-user me-2"></i>First Name</label>
          </div>
          <div class="col form-floating">
            <input type="text" class="form-control" id="lastName" placeholder=" " required>
            <label for="lastName"><i class="fa fa-user me-2"></i>Last Name</label>
          </div>
        </div>
        <div class="form-floating mb-3">
          <input type="tel" class="form-control" id="phone" placeholder=" " required>
          <label for="phone"><i class="fa fa-phone me-2"></i>Phone Number</label>
        </div>
        <div class="form-floating mb-3">
          <select class="form-select" id="role" required>
            <option value="" disabled selected></option>
            <option value="admin">Admin</option>
            <option value="manager">Manager</option>
            <option value="attendant">Attendant</option>
          </select>
          <label for="role"><i class="fa fa-users me-2"></i>Select Role</label>
        </div>
        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="email" placeholder=" " required>
          <label for="email"><i class="fa fa-envelope me-2"></i>Email</label>
        </div>
        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="password" placeholder=" " required>
          <label for="password"><i class="fa fa-lock me-2"></i>Password</label>
        </div>
        <button type="submit" class="btn btn-signup w-100"><i class="fa fa-paper-plane me-2"></i>Sign Up</button>
      </form>
    </div>
  </div>

  <!-- Success Overlay -->
  <div class="success-overlay" id="successOverlay">
    <i class="fa fa-check-circle checkmark"></i>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/public/practice/js/signup.js"></script>
</body>
</html>
